# HyPaper 0G — CI/CD Pipeline
# Triggers on PR and main push.
# Jobs: lint/test, contract tests, docker build, staging deploy.

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BUN_VERSION: '1'
  NODE_VERSION: '20'

jobs:
  # ── Engine: lint + unit tests ──────────────────────────────
  engine-test:
    name: Engine Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: TypeScript check
        run: cd packages/engine && bun tsc --noEmit

      - name: Run unit tests
        run: cd packages/engine && bun test
        env:
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
          OG_RPC_URL: https://evmrpc-testnet.0g.ai
          OG_CHAIN_ID: '16602'

  # ── Contracts: forge build + test ──────────────────────────
  contract-test:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install OpenZeppelin
        run: cd packages/contracts && forge install OpenZeppelin/openzeppelin-contracts --no-commit

      - name: Build contracts
        run: cd packages/contracts && forge build --evm-version cancun

      - name: Run tests
        run: cd packages/contracts && forge test -vvv

  # ── Docker: verify build ───────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [engine-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build engine image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: hypaper-engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to staging (main only) ─────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [engine-test, contract-test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/hypaper
            git pull origin main
            docker compose --profile production pull
            docker compose --profile production up -d --build --remove-orphans
            docker compose --profile production exec engine curl -sf http://localhost:3001/health
            echo "Deployment successful ✓"
