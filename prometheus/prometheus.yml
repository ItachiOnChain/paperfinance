# Prometheus configuration for HyPaper 0G Engine

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/alerts.yml

scrape_configs:
  - job_name: 'hypaper-engine'
    static_configs:
      - targets: ['engine:3001']
    metrics_path: /metrics
    scrape_interval: 5s
    scrape_timeout: 3s
