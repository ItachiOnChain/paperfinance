# Nginx reverse proxy + WebSocket upgrade + SSL termination
# Mount certs at /etc/nginx/certs/fullchain.pem and privkey.pem

events {
    worker_connections 4096;
}

http {
    # ── Upstream (engine replicas) ───────────────────────────
    upstream engine {
        least_conn;
        server engine:3001;
    }

    # ── Rate limiting ────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=wsconn:10m;

    # ── HTTP → HTTPS redirect ────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check (no redirect)
        location /health {
            proxy_pass http://engine;
        }

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ─────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # ── API routes ───────────────────────────────────────
        location / {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ── WebSocket upgrade ────────────────────────────────
        location /ws {
            limit_conn wsconn 10;
            proxy_pass http://engine;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Metrics (internal only) ──────────────────────────
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://engine;
        }
    }
}
