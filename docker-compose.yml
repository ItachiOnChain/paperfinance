version: '3.9'

# ── HyPaper 0G — Docker Compose (Production) ────────────────
# Usage:
#   Development:  docker compose up
#   Production:   docker compose --profile production up -d

services:
  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: >
      redis-server
        --appendonly yes
        --maxmemory 2gb
        --maxmemory-policy allkeys-lru
        --tcp-keepalive 60
        --timeout 0
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: hypaper
      POSTGRES_USER: hypaper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hypaper_dev}
    volumes:
      - pg-data:/var/lib/postgresql/data
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c wal_level=replica
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U hypaper -d hypaper' ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Engine (Paper Trading Server) ───────────────────────────
  engine:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      NODE_ENV: production
      LOG_LEVEL: warn
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://hypaper:${POSTGRES_PASSWORD:-hypaper_dev}@postgres:5432/hypaper
      JWT_SECRET: ${JWT_SECRET}
      DEMO_MODE_SECRET: ${DEMO_MODE_SECRET}
      OG_RPC_URL: ${OG_RPC_URL}
      OG_WS_URL: ${OG_WS_URL}
      OG_CHAIN_ID: ${OG_CHAIN_ID:-16602}
      BINANCE_WS_URL: ${BINANCE_WS_URL:-wss://stream.binance.com:9443/stream}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:3001/health' ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 1G

  # ── Prometheus (production profile) ─────────────────────────
  prometheus:
    image: prom/prometheus:latest
    profiles: [ 'production' ]
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./grafana/alerts.yml:/etc/prometheus/rules/alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      - engine
    restart: unless-stopped

  # ── Grafana (production profile) ────────────────────────────
  grafana:
    image: grafana/grafana:latest
    profiles: [ 'production' ]
    ports:
      - '3002:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/dashboard.json:/var/lib/grafana/dashboards/hypaper.json
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Nginx (production profile) ──────────────────────────────
  nginx:
    image: nginx:alpine
    profiles: [ 'production' ]
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - engine
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost/health' ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  redis-data:
  pg-data:
  prometheus-data:
  grafana-data:
